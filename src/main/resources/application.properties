spring.application.name=realticker-backend
huggingface.api.token=${HF_TOKEN:}

# Render production config
server.port=${PORT:8080}
logging.level.com.siva.realticker=DEBUG
logging.level.org.springframework.web=DEBUG
spring.mvc.servlet.path=/

server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

spring.cache.cache-names=topStocks,stockBySymbol,stockHistory,aiAnalysis